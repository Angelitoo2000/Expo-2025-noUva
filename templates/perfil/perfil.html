<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Profile</title>
</head>
<body class="bg-gray-100 font-sans">

<nav class="bg-[#00224F] text-white p-4">
  <div class="container mx-auto flex items-center justify-between">
    <!-- Logo -->
    <img src="{{ url_for('static', filename='home/logoFondoAzul.jpeg') }}" 
         alt="Logo" class="h-16 w-40">
    <div class="flex items-center space-x-6">
      <a href="{{ url_for('home_page') }}" class="hover:underline">Home</a>
      <a href="{{ url_for('universities_page') }}" class="hover:underline">Universities</a>
      <a href="{{ url_for('podcasts_page') }}" class="hover:underline">Podcasts</a>
      <a href="{{ url_for('challenges_page') }}" class="hover:underline">Challenges</a>
      <a href="{{ url_for('subcription_page') }}" class="hover:underline">Get premium</a>

      <!-- Foto de perfil -->
      <a href="{{ url_for('perfil_page') }}">
        <img id="navbar-pic"
             src="{{ url_for('static', filename='default.png') }}" 
             alt="Profile"
             class="h-10 w-10 rounded-full border-2 border-white object-cover object-center hover:scale-105 transition-transform duration-200">
      </a>
    </div>
  </div>
</nav>

  <main class="container mx-auto mt-10 p-5">

    <section class="text-center mb-10">
      <h1 id="profile-name" class="text-3xl font-bold text-gray-800">Loading...</h1>
      <p class="text-gray-600">Update your profile and preferences.</p>
    </section>

    <section class="bg-gray-50 rounded-2xl shadow-lg p-8 mb-8 flex flex-col md:flex-row items-center justify-center space-y-6 md:space-y-0 md:space-x-6">

      <div class="relative w-40 h-40 rounded-full overflow-hidden shadow-md border-4 border-white">
        <img id="profile-pic" 
             class="w-full h-full object-cover rounded-full"
             src="{{ url_for('static', filename='default.png') }}" 
             alt="Profile picture">
      </div>

      <div class="flex flex-col space-y-4 items-center md:items-start">
        <label for="file-upload" 
               class="block w-full md:w-auto px-6 py-2 bg-[#00224F] text-white font-semibold rounded-xl text-center cursor-pointer hover:bg-[#001633] transition-colors shadow-md">
          Change profile picture
        </label>
        <input id="file-upload" type="file" class="hidden" accept="image/*" />

        <button id="btn-remove-pic" 
                class="block w-full md:w-auto px-6 py-2 bg-[#00224F] text-white font-semibold rounded-xl text-center hover:bg-[#001633] transition-colors shadow-md">
          Remove profile picture
        </button>
      </div>
    </section>

    <section class="bg-white rounded-2xl shadow-lg p-8">
      <h2 class="text-xl font-bold text-gray-800 mb-6">Personal information</h2>
      <form id="profile-form" class="space-y-6">
        <div>
          <label for="input-name" class="block text-sm font-semibold text-gray-700">Name</label>
          <input id="input-name" name="nombre" type="text"
                 class="mt-1 block w-full px-4 py-2 bg-transparent border-0 border-b-2 border-gray-300 
                        focus:border-[#00224F] focus:ring-0 focus:outline-none" />
        </div>
        <div>
          <button type="submit"
                  class="w-full py-2 px-4 bg-[#00224F] text-white rounded-lg shadow-md hover:bg-[#001633] transition">
            Save changes
          </button>
        </div>
      </form>
    </section>
  </main>

  <div id="message-box" class="fixed bottom-5 left-1/2 -translate-x-1/2 p-4 rounded-xl shadow-lg text-white font-medium z-50 transition-opacity duration-300 opacity-0"></div>


  <footer class="bg-[#00224F] text-white text-center py-6 mt-10">
    <p class="text-sm">&copy; 2025 NoUva. All rights reserved.</p>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const profilePic = document.getElementById("profile-pic");
      const navbarPic = document.getElementById("navbar-pic");
      const profileName = document.getElementById("profile-name");
      const inputName = document.getElementById("input-name");
      const profileForm = document.getElementById("profile-form");
      const btnRemovePic = document.getElementById("btn-remove-pic");
      const fileUpload = document.getElementById("file-upload");
      const messageBox = document.getElementById("message-box");

      function showMessage(message, isError = false) {
        messageBox.textContent = message;
        messageBox.className = `fixed bottom-5 left-1/2 -translate-x-1/2 p-4 rounded-xl shadow-lg text-white font-medium z-50 transition-opacity duration-300 opacity-100 ${isError ? 'bg-red-500' : 'bg-green-500'}`;
        setTimeout(() => {
          messageBox.className = `fixed bottom-5 left-1/2 -translate-x-1/2 p-4 rounded-xl shadow-lg text-white font-medium z-50 transition-opacity duration-300 opacity-0`;
        }, 5000);
      }

      try {
        const res = await fetch("http://127.0.0.1:5000/profile", { credentials: "include" });
        const data = await res.json();
        if (!data.error) {
          profileName.innerText = data.nombre;
          inputName.value = data.nombre;
          if (data.foto_url) {
            profilePic.src = "/static/" + data.foto_url;
            navbarPic.src = "/static/" + data.foto_url;
          }
        }
      } catch {}

      // Subir foto
      fileUpload.addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append("file", file);

        try {
          const res = await fetch("/profile/picture", {
            method: "POST",
            body: formData,
            credentials: "include"
          });
          const msg = await res.json();
          showMessage(msg.error || msg.message, !!msg.error);
          if (!msg.error) {
            profilePic.src = msg.foto_url;
            navbarPic.src = msg.foto_url;
          }
        } catch {
          showMessage("Error uploading picture.", true);
        }
      });

      // Guardar nombre
      profileForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const updated = { nombre: inputName.value };

        try {
          const res = await fetch("/profile", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(updated),
            credentials: "include"
          });
          const msg = await res.json();
          showMessage(msg.error || msg.message, !!msg.error);
          if (!msg.error) profileName.innerText = updated.nombre;
        } catch {
          showMessage("Error saving name.", true);
        }
      });

      // Eliminar foto
      btnRemovePic.addEventListener("click", async () => {
        try {
          const res = await fetch("/profile/picture", {
            method: "DELETE",
            credentials: "include"
          });
          const msg = await res.json();
          showMessage(msg.error || msg.message, !!msg.error);
          if (!msg.error) {
            profilePic.src = msg.foto_url;
            navbarPic.src = msg.foto_url;
          }
        } catch {
          showMessage("Error deleting picture.", true);
        }
      });
    });
  </script>
</body>
</html>
