<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Home</title>
</head>
<body class="bg-gray-100 font-sans">

  <!-- Navbar -->
<nav class="bg-[#00224F] text-white p-4">
  <div class="container mx-auto flex items-center justify-between">
    <!-- Logo -->
    <img src="{{ url_for('static', filename='home/logoFondoAzul.jpeg') }}" 
         alt="Logo" class="h-16 w-40">
    <div class="flex items-center space-x-6">
      <a href="{{ url_for('home_page') }}" class="hover:underline">Home</a>
      <a href="{{ url_for('universities_page') }}" class="hover:underline">Universities</a>
      <a href="{{ url_for('podcasts_page') }}" class="hover:underline">Podcasts</a>
      <a href="{{ url_for('challenges_page') }}" class="hover:underline">Challenges</a>
      <a href="{{ url_for('subcription_page') }}" class="hover:underline">Get premium</a>

      <!-- Foto de perfil -->
      <a href="{{ url_for('perfil_page') }}">
        <img id="navbar-pic"
             src="{{ url_for('static', filename='default.png') }}" 
             alt="Profile"
             class="h-10 w-10 rounded-full border-2 border-white object-cover object-center hover:scale-105 transition-transform duration-200">
      </a>
    </div>
  </div>
</nav>


  <main class="container mx-auto mt-10 ">

    <section class="my-20">
  <h2 class="font-bold text-3xl md:text-4xl text-center text-gray-800 mb-10">
    Most Popular Majors
  </h2>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-10 px-6 md:px-20">
    <div class="bg-white p-10 flex flex-col items-center justify-center rounded-2xl shadow-xl hover:shadow-2xl transition-shadow duration-300 min-h-[480px]">
      <img src="{{ url_for('static', filename='home/ComputerScince.png') }}" alt="Computer Science" class="w-42 h-72 mb-6">
      <span class="font-bold text-gray-700 text-lg md:text-xl text-center">
        Computer Science
      </span>
    </div>

    <div class="bg-white p-10 flex flex-col items-center justify-center rounded-2xl shadow-xl hover:shadow-2xl transition-shadow duration-300 min-h-[480px]">
      <img src="{{ url_for('static', filename='home/Marketing.png') }}" alt="Marketing" class="w-42 h-76 mb-6">
      <span class="font-bold text-gray-700 text-lg md:text-xl text-center">
        Marketing
      </span>
    </div>

    <div class="bg-white p-10 flex flex-col items-center justify-center rounded-2xl shadow-xl hover:shadow-2xl transition-shadow duration-300 min-h-[480px]">
      <img src="{{ url_for('static', filename='home/Business.png') }}" alt="Business" class="w-42 h-72 mb-6">
      <span class="font-bold text-gray-700 text-lg md:text-xl text-center">
        Business
      </span>
    </div>
  </div>
</section>

    <section class="my-16">
      <h2 class="font-bold text-3xl md:text-4xl text-center text-gray-800 mb-10">Featured Universities</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <a href="{{ url_for('donBosco_page') }}" class="bg-white p-6 flex flex-col items-center justify-center rounded-xl shadow-lg hover:shadow-2xl transition-shadow duration-300">
          <img src="{{ url_for('static', filename='home/facebook.jpg') }}" alt="Universidad Don Bosco" class="w-62 h-52 object-cover rounded-md mb-4">
          <p class="font-bold text-gray-700">Universidad Don Bosco</p>
        </a>
        <a href="{{ url_for('universities_page') }}" class="bg-white p-6 flex flex-col items-center justify-center rounded-xl shadow-lg hover:shadow-2xl transition-shadow duration-300">
          <img src="{{ url_for('static', filename='home/R.jpeg') }}" alt="Universidad De El Salvador" class="w-62 h-52 object-cover rounded-md mb-4">
          <p class="font-bold text-gray-700">Universidad Tecnologica</p>
        </a>
        <a href="{{ url_for('universities_page') }}" class="bg-white p-6 flex flex-col items-center justify-center rounded-xl shadow-lg hover:shadow-2xl transition-shadow duration-300">
          <img src="{{ url_for('static', filename='home/USAM-CAMPUS.jpg') }}" alt="Universidad Gerardo Barrios" class="w-62 h-52 object-cover rounded-md mb-4">
          <p class="font-bold text-gray-700">Universidad Salvadorena Alberto Masferrer</p>
        </a>
      </div>

  </main>

  <script>
document.addEventListener("DOMContentLoaded", async () => {
    try {
        const res = await fetch("http://127.0.0.1:5000/profile", {
            credentials: "include" 
        });
        const data = await res.json();
        if (data && !data.error && data.foto_url) {
            document.getElementById("navbar-pic").src = "/static/" + data.foto_url;
        }
    } catch (err) {
        console.error("Error cargando foto:", err);
    }
});
</script>

  <footer class="bg-[#00224F] text-white text-center py-6 mt-10">
    <p class="text-sm">&copy; 2025 NoUva. All rights reserved.</p>
  </footer>

</body>
</html>
